<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Quiz 01</title>
</head>
<body>
    <h1>Form</h1>
    <form action="Form Fill Up" method="post">
        <div>
            <label for="username">Enter your username</label>
            <input type="text" name="username" id="username" placeholder="Enter your username" autofocus>
        </div>
        <div>
            <label for="city">Type your city name</label>
            <input type="text" name="city" id="city" placeholder="City name">
        </div>
        <div>
            <label for="pincode">Pincode</label>
            <input type="number" name="pincode" id="pincode">
        </div>
        <div>
            <label for="comment">Enter your comment</label>
        </div>
        <div>
            <textarea name="comment" id="comment" rows="3" cols="50"></textarea>
        </div>
    </form>
</body>
</html>
