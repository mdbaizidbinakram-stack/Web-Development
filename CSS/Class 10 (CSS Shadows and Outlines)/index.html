<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows & Outlines</title>
    <style>
        .box{
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 15px 5px gray;
        }

    .text-element{
        text-shadow: 8px 8px 7px #e695f7;
        outline: 2px solid blue;
    }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>

    <p class="text-element">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quas, recusandae porro! Ex aliquam dolor minus eaque facere, asperiores vel expedita voluptate dignissimos dolorem fugiat amet praesentium, autem eligendi veniam adipisci, ab voluptatem explicabo quisquam.</p>
</body>
</html>
