<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        h1{
            color: maroon;
        }
        .red{
            background-color: red;
        }
        #green{
            background-color: green;
        }
        div p{
            background-color: gray;
            color: blue;
        }
        div > p {
            color: blue;
            background-color: brown;
        }
        *{
            padding: 0;
            margin: 0;
        }
        a:visited{
            color: yellow;
        }
        a:link{
            color: green;
        }
        a:active{
            background-color: red;
        }
        a:hover{
            background-color: magenta;
        }
        p:first-child{
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <h1>CSS Selectors</h1>
    <main class="One">
        <p>I am first</p>
        <p>I am second</p>
    </main>
    <div class="red">
        I am a div
        <p>I am a para inside a div</p>
    </div>
    <div id="green">
        I am another div
        <article>
            <p>para 2.0</p>
        </article>
    </div>
    <a href="https://www.google.com">Google</a>
    <a href="https://www.facebook2.com">Facebook</a>
</body>
</html>
