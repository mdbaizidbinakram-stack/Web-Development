<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity & Casecade</title>
    <style>
        * {
            color: magenta;
        }

        h1 {
            color: aqua;
        }

        .yellow {
            color: yellow;
        }

        .cred {
            color: red;
        }

        .cpurple {
            color: purple;
        }

        /* #one {
            color: brown;
        } */

        /* .cred {
            color: yellowgreen !important;
        } */
        /* This is an example of attribute selector. */
        [data-x=a] {
            color: maroon;
        }
    </style>
</head>

<body>
    <div>
        <!-- <h1 style="color: blue;" class="yellow cred cpurple" id="one">CSS Specificity</h1> -->
        <h1 class="yellow cred cpurple" data-x="a">CSS Specificity</h1>
    </div>
</body>

</html>
